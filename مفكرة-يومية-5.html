<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفكرتي اليومية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: #fdf6f0;
    min-height: 100vh;
    padding: 20px;
    color: #3d2b1f;
  }
  .header {
    background: linear-gradient(135deg, #c8956c, #e8b49a);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(200,149,108,0.3);
  }
  .header h1 { font-size: 28px; color: white; font-weight: 800; }
  .date-display {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    padding: 8px 15px;
    display: inline-block;
    margin-top: 8px;
    color: white;
    font-size: 14px;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .card {
    background: white;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  }
  .card.full { grid-column: 1 / -1; }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #fdf6f0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .task-item:hover { background: #fde8d8; }
  .task-item.done { opacity: 0.5; }
  .task-item.done span { text-decoration: line-through; }
  .checkbox {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid #c8956c;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .task-item.done .checkbox {
    background: #c8956c;
    border-color: #c8956c;
    color: white;
  }
  .add-input {
    width: 100%; padding: 10px 15px;
    border: 2px dashed #e8b49a;
    border-radius: 10px;
    background: transparent;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    color: #3d2b1f;
    margin-top: 8px;
    outline: none;
    text-align: right;
  }
  .add-input:focus { border-color: #c8956c; background: #fdf6f0; }
  .time-blocks { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .time-block {
    background: linear-gradient(135deg, #fdf0e8, #fde8d8);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
  }
  .time-label { font-size: 11px; color: #c8956c; font-weight: 700; margin-bottom: 5px; }
  .time-input {
    width: 100%; background: transparent; border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px; color: #3d2b1f;
    text-align: center; outline: none; resize: none;
  }
  .mood-row { display: flex; justify-content: space-around; margin-top: 10px; }
  .mood-btn {
    font-size: 28px; cursor: pointer;
    padding: 8px; border-radius: 50%;
    transition: transform 0.2s;
    border: 3px solid transparent;
  }
  .mood-btn:hover { transform: scale(1.2); }
  .mood-btn.selected { border-color: #c8956c; background: #fde8d8; }
  .note-area {
    width: 100%; min-height: 100px;
    background: #fdf6f0; border: none;
    border-radius: 12px; padding: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px; color: #3d2b1f;
    resize: none; outline: none;
    line-height: 1.8;
    text-align: right;
  }
  .water-track { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .water-cup {
    font-size: 24px; cursor: pointer;
    opacity: 0.3; transition: all 0.2s;
  }
  .water-cup.filled { opacity: 1; }
  .progress-bar {
    height: 8px; background: #fde8d8;
    border-radius: 10px; overflow: hidden; margin-top: 10px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8956c, #e8b49a);
    border-radius: 10px;
    transition: width 0.3s;
  }
  .save-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #c8956c, #e8b49a);
    border: none; border-radius: 15px;
    color: white; font-size: 16px; font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer; margin-top: 15px;
    transition: transform 0.2s;
  }
  .save-btn:hover { transform: scale(1.02); }
  .priority-badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 20px; font-weight: 700;
  }
  .high { background: #ffe0e0; color: #c0392b; }
  .med { background: #fff3e0; color: #e67e22; }
  .low { background: #e0f5e0; color: #27ae60; }
</style>
</head>
<body>

<div class="header">
  <h1>📓 مفكرتي اليومية</h1>
  <div class="date-display" id="dateDisplay"></div>
</div>

<div class="grid">

  <!-- المهام -->
  <div class="card full">
    <div class="card-title">✅ مهام اليوم</div>
    <div id="taskList"></div>
    <input class="add-input" id="taskInput" placeholder="+ أضيفي مهمة جديدة واضغطي Enter" onkeydown="addTask(event)">
    <div class="progress-bar" style="margin-top:12px">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div style="text-align:center; font-size:12px; color:#c8956c; margin-top:5px" id="progressText">0 من 0 مهام مكتملة</div>
  </div>

  <!-- الجدول الزمني -->
  <div class="card">
    <div class="card-title">⏰ جدولي</div>
    <div class="time-blocks">
      <div class="time-block">
        <div class="time-label">الصباح</div>
        <textarea class="time-input" rows="3" placeholder="ماذا ستفعلين؟"></textarea>
      </div>
      <div class="time-block">
        <div class="time-label">الظهيرة</div>
        <textarea class="time-input" rows="3" placeholder="ماذا ستفعلين؟"></textarea>
      </div>
      <div class="time-block">
        <div class="time-label">المساء</div>
        <textarea class="time-input" rows="3" placeholder="ماذا ستفعلين؟"></textarea>
      </div>
    </div>
  </div>

  <!-- المزاج -->
  <div class="card">
    <div class="card-title">💭 مزاجي اليوم</div>
    <div class="mood-row">
      <div class="mood-btn" onclick="selectMood(this)">😊</div>
      <div class="mood-btn" onclick="selectMood(this)">🥰</div>
      <div class="mood-btn" onclick="selectMood(this)">😐</div>
      <div class="mood-btn" onclick="selectMood(this)">😔</div>
      <div class="mood-btn" onclick="selectMood(this)">😤</div>
    </div>
  </div>

  <!-- الماء -->
  <div class="card">
    <div class="card-title">💧 شرب الماء</div>
    <div class="water-track" id="waterTrack"></div>
    <div style="text-align:center; font-size:12px; color:#c8956c; margin-top:8px" id="waterCount">0 / 8 أكواب</div>
  </div>

  <!-- ملاحظات -->
  <div class="card full">
    <div class="card-title">📝 ملاحظاتي</div>
    <textarea class="note-area" placeholder="اكتبي ما يدور في ذهنك..."></textarea>
  </div>

</div>

<button class="save-btn" onclick="saveAll()">💾 حفظ يومي</button>

<script>
  // التاريخ
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const now = new Date();
  document.getElementById('dateDisplay').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

  // المهام
  let tasks = [];
  function addTask(e) {
    if(e.key === 'Enter') {
      const val = e.target.value.trim();
      if(!val) return;
      tasks.push({ text: val, done: false });
      e.target.value = '';
      renderTasks();
    }
  }
  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = tasks.map((t,i) => `
      <div class="task-item ${t.done?'done':''}" onclick="toggleTask(${i})">
        <div class="checkbox">${t.done?'✓':''}</div>
        <span style="flex:1">${t.text}</span>
      </div>
    `).join('');
    const done = tasks.filter(t=>t.done).length;
    const pct = tasks.length ? (done/tasks.length*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done} من ${tasks.length} مهام مكتملة`;
  }
  function toggleTask(i) { tasks[i].done = !tasks[i].done; renderTasks(); }

  // الماء
  const waterTrack = document.getElementById('waterTrack');
  let water = 0;
  for(let i=0; i<8; i++) {
    const cup = document.createElement('div');
    cup.className = 'water-cup';
    cup.textContent = '🥤';
    cup.onclick = () => {
      water = i < water ? i : i+1;
      document.querySelectorAll('.water-cup').forEach((c,j) => {
        c.className = 'water-cup' + (j < water ? ' filled' : '');
      });
      document.getElementById('waterCount').textContent = `${water} / 8 أكواب`;
    };
    waterTrack.appendChild(cup);
  }

  // المزاج
  function selectMood(el) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  // الحفظ
  function saveAll() {
    const btn = document.querySelector('.save-btn');
    btn.textContent = '✅ تم الحفظ!';
    btn.style.background = 'linear-gradient(135deg, #27ae60, #2ecc71)';
    setTimeout(() => {
      btn.textContent = '💾 حفظ يومي';
      btn.style.background = 'linear-gradient(135deg, #c8956c, #e8b49a)';
    }, 2000);
  }
</script>
</body>
</html>
